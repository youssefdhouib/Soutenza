spring.application.name=soutenza-backend
server.port=${SERVER_PORT:9006}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/soutenza?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:inter}

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.jwt.secret=${APP_JWT_SECRET:ReplaceThisWithAtLeast32CharactersLongJwtSecretKey}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha

# SMTP Mail (Gmail — set MAIL_USERNAME and MAIL_PASSWORD as env vars)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:soutenza@gmail.com}
spring.mail.password=${MAIL_PASSWORD:tkgezorfumiticll}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:soutenza@gmail.com}
